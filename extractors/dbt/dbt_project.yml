name: 'ad_spend_mmm'
version: '1.0.0'
config-version: 2

profile: 'ad_spend_mmm'

model-paths: ["models"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  ad_spend_mmm:
    staging:
      +materialized: view          # staging models as views (lightweight)
      +schema: staging
    marts:
      +materialized: table         # marts as physical tables (queryable by others)
      +schema: marts